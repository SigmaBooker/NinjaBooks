<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SigmaBooker | NinjaBooks Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .view-section { display: none !important; }
        .view-section.active { display: block !important; }
        #ninjabooks-layout.active, #admin-dashboard-view.active { display: flex !important; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; }
        .modal-active { display: flex; }
        .sidebar-item:hover .submenu { display: block; }
        .submenu { display: none; position: absolute; left: 100%; top: 0; width: 200px; background: #1e293b; border-radius: 12px; padding: 10px; box-shadow: 10px 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- PUBLIC NAVIGATION -->
    <nav id="public-ribbon" class="flex justify-between items-center px-10 py-5 bg-white border-b sticky top-0 z-[60]">
        <div onclick="showView('landing-view')" class="text-2xl font-black text-blue-600 tracking-tighter cursor-pointer">SigmaBooker</div>
        <div class="flex gap-8 items-center">
            <button onclick="showView('landing-view')" class="font-bold text-slate-600 hover:text-blue-600">Blogs</button>
            <button onclick="showView('contact-view')" class="font-bold text-slate-600 hover:text-blue-600">Contact Us</button>
            <button onclick="toggleLoginModal(true)" class="font-bold text-slate-600">Login</button>
            <button onclick="showView('signup-view')" class="px-6 py-2 bg-blue-600 text-white rounded-full font-bold shadow-lg">Sign-up</button>
        </div>
    </nav>

    <!-- LANDING PAGE -->
    <div id="landing-view" class="view-section active">
        <header class="container mx-auto px-10 py-24 text-center">
            <h1 class="text-6xl font-black mb-6 tracking-tight">Accounting for <span class="text-blue-600">NinjaBooks</span></h1>
            <p class="text-xl text-slate-500 max-w-2xl mx-auto">Professional resources and tools for the global accounting industry.</p>
        </header>
    </div>

    <!-- SIGNUP VIEW -->
    <section id="signup-view" class="view-section min-h-[70vh] flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[40px] shadow-2xl w-full max-w-md border">
            <h2 class="text-3xl font-black text-center mb-8">Sign Up</h2>
            <form id="signup-form" class="space-y-4">
                <input type="text" id="su-name" placeholder="Full Name" required class="w-full p-4 border rounded-2xl outline-none">
                <input type="email" id="su-email" placeholder="Email" required class="w-full p-4 border rounded-2xl outline-none">
                <input type="password" id="su-pass" placeholder="Create Password" required class="w-full p-4 border rounded-2xl outline-none">
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold">Register</button>
            </form>
        </div>
    </section>

    <!-- LOGIN MODAL -->
    <div id="login-modal" class="modal-overlay">
        <div class="bg-white p-10 rounded-[32px] shadow-2xl w-full max-w-sm relative">
            <button onclick="toggleLoginModal(false)" class="absolute top-6 right-6 text-slate-300 text-3xl">&times;</button>
            <h2 class="text-2xl font-black text-center mb-6">Login</h2>
            <form id="login-form" class="space-y-4">
                <input type="email" id="li-email" placeholder="Email" required class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                <input type="password" id="li-pass" placeholder="Password" required class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold">Login</button>
            </form>
        </div>
    </div>

    <!-- SUPER ADMIN DASHBOARD -->
    <section id="admin-dashboard-view" class="view-section h-screen flex">
        <aside class="w-72 bg-slate-900 text-slate-400 p-8 flex flex-col shrink-0">
            <div class="text-white text-2xl font-black mb-12 tracking-tighter">NinjaAdmin</div>
            <nav class="space-y-4 flex-grow">
                <button onclick="loadAdminData()" class="w-full text-left p-4 bg-blue-600 text-white rounded-2xl font-bold">🏢 Company Approvals</button>
                <button onclick="alert('Coming soon')" class="w-full text-left p-4 hover:bg-slate-800 rounded-2xl transition">👥 All Users</button>
            </nav>
            <button onclick="location.reload()" class="p-4 text-left border-t border-slate-800 hover:text-white">Logout Admin</button>
        </aside>
        <main class="flex-1 bg-[#f8fafc] p-12 overflow-y-auto">
            <h2 class="text-4xl font-black mb-10">Control Center</h2>
            <div class="bg-white border rounded-[32px] shadow-sm overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-[10px] uppercase font-black text-slate-400 border-b">
                        <tr><th class="p-6">Company</th><th class="p-6">User</th><th class="p-6">Reg #</th><th class="p-6">Status</th><th class="p-6">Actions</th></tr>
                    </thead>
                    <tbody id="admin-table-body"></tbody>
                </table>
            </div>
        </main>
    </section>

    <!-- COMPANY SETUP (USER) -->
    <section id="setup-view" class="view-section min-h-screen bg-slate-50 p-10 flex items-center justify-center">
        <div class="max-w-4xl w-full bg-white p-12 rounded-[40px] shadow-xl border">
            <h2 class="text-3xl font-black mb-8 border-b pb-4">Setup Your Business</h2>
            <form id="setup-form" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <input type="text" id="c-name" placeholder="Company Name" required class="md:col-span-2 p-4 border rounded-xl bg-slate-50">
                <select id="c-type" class="p-4 border rounded-xl bg-slate-50">
                    <option>Retail</option><option>Manufacturing</option><option>Services</option>
                </select>
                <input type="text" id="c-reg" placeholder="Reg Number" required class="p-4 border rounded-xl bg-slate-50">
                <textarea id="c-addr" placeholder="Business Address" class="md:col-span-2 p-4 border rounded-xl bg-slate-50 h-24" required></textarea>
                <input type="text" id="c-tax" placeholder="Tax Number" class="p-4 border rounded-xl bg-slate-50">
                <input type="text" id="c-emp" placeholder="Employees" class="p-4 border rounded-xl bg-slate-50">
                <div class="md:col-span-2 flex justify-end">
                    <button type="submit" class="bg-green-600 text-white px-12 py-4 rounded-2xl font-bold shadow-lg">Submit for Approval</button>
                </div>
            </form>
        </div>
    </section>

    <!-- NINJABOOKS INTERFACE -->
    <div id="ninjabooks-layout" class="view-section h-screen flex overflow-hidden">
        <aside class="w-64 bg-[#0f172a] text-slate-400 p-6 flex flex-col shrink-0">
            <div class="text-white text-xl font-black mb-10">NinjaBooks</div>
            <nav class="space-y-1 flex-grow overflow-y-auto">
                <div class="flex items-center gap-4 p-3 hover:bg-slate-800 rounded-xl cursor-pointer text-white">🏠 Dashboard</div>
            </nav>
            <button onclick="location.reload()" class="p-3 border-t border-slate-800">Logout</button>
        </aside>
        <main class="flex-1 flex flex-col bg-white overflow-hidden">
            <header class="h-20 border-b flex items-center justify-between px-8">
                <span class="text-blue-600 font-black text-2xl">NinjaBooks</span>
            </header>
            <div id="dashboard-status" class="p-10">
                <!-- Status content -->
            </div>
        </main>
    </div>

    <script>
        const CONFIG = {
            SB_URL: 'https://wfzspufplnkqvrkjieuc.supabase.co',
            SB_KEY: 'sb_publishable_TnJiQXc6mYwCDWKXy2YtFQ_ollv29yY',
            EJS_SVC: 'service_adbqgxl',
            EJS_TMP: 'template_uv8n1b4',
            EJS_PUB: 'd3ltqxtM03wNxFm02'
            ADMIN_EMAIL: 'aslam.975114@gmail.com'
        };

        const _supabase = supabase.createClient(CONFIG.SB_URL, CONFIG.SB_KEY);
        emailjs.init(CONFIG.EJS_PUB);

        function showView(viewId) {
            const nav = document.getElementById('public-ribbon');
            nav.style.display = (viewId === 'ninjabooks-layout' || viewId === 'admin-dashboard-view' || viewId === 'setup-view') ? 'none' : 'flex';
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        function toggleLoginModal(show) { document.getElementById('login-modal').classList.toggle('modal-active', show); }

        // --- LOGIN LOGIC (FIXED) ---
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const { data: auth, error } = await _supabase.auth.signInWithPassword({
                email: document.getElementById('li-email').value,
                password: document.getElementById('li-pass').value
            });

            if (error) return alert(error.message);
            toggleLoginModal(false);

            // 1. Fetch user role
            const { data: profile } = await _supabase.from('profiles').select('role').eq('id', auth.user.id).single();

            if (profile && profile.role === 'superadmin') {
                showView('admin-dashboard-view');
                loadAdminData();
            } else {
                // 2. Check if company exists for regular user
                const { data: company } = await _supabase.from('companies').select('status').eq('user_id', auth.user.id).single();
                if (!company) {
                    showView('setup-view');
                } else {
                    showView('ninjabooks-layout');
                    renderUserDashboard(company.status);
                }
            }
        };

        function renderUserDashboard(status) {
            const container = document.getElementById('dashboard-status');
            if (status === 'pending') {
                container.innerHTML = `<div class="bg-orange-50 border border-orange-200 p-10 rounded-3xl text-center">
                    <h2 class="text-2xl font-bold text-orange-600">Pending Approval</h2>
                    <p class="text-slate-600 mt-2">Your company is being reviewed by the administrator.</p>
                </div>`;
            } else {
                container.innerHTML = `<h2 class="text-3xl font-bold">Welcome to NinjaBooks</h2>`;
            }
        }

        async function loadAdminData() {
            const { data } = await _supabase.from('companies').select('*').order('created_at', { ascending: false });
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = data.map(comp => `
                <tr class="border-b">
                    <td class="p-6 font-bold">${comp.name}</td>
                    <td class="p-6">${comp.email}</td>
                    <td class="p-6 font-mono">${comp.reg_number}</td>
                    <td class="p-6"><span class="px-3 py-1 rounded-full text-[10px] font-bold ${comp.status === 'approved' ? 'bg-green-100 text-green-600' : 'bg-orange-100 text-orange-600'}">${comp.status}</span></td>
                    <td class="p-6">
                        ${comp.status === 'pending' ? `<button onclick="approve('${comp.id}')" class="bg-green-600 text-white px-4 py-2 rounded-xl text-xs font-bold">Approve</button>` : ''}
                    </td>
                </tr>
            `).join('');
        }

        async function approve(id) {
            await _supabase.from('companies').update({ status: 'approved' }).eq('id', id);
            loadAdminData();
        }

        document.getElementById('setup-form').onsubmit = async (e) => {
            e.preventDefault();
            const { data: { user } } = await _supabase.auth.getUser();
            const { error } = await _supabase.from('companies').insert([{
                user_id: user.id,
                name: document.getElementById('c-name').value,
                type: document.getElementById('c-type').value,
                reg_number: document.getElementById('c-reg').value,
                address_biz: document.getElementById('c-addr').value,
                tax_id: document.getElementById('c-tax').value,
                employees: document.getElementById('c-emp').value,
                email: user.email
            }]);

            if (error) alert(error.message);
            else {
                alert("Submitted!");
                showView('ninjabooks-layout');
                renderUserDashboard('pending');
            }
        };
    </script>
</body>
</html>
