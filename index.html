<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SigmaBooker | NinjaBooks Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .step-pill.active { background-color: #2563eb; color: white; }
        .step-pill.completed { background-color: #10b981; color: white; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .input-group label { display: block; font-size: 12px; font-weight: 700; color: #6b7280; text-transform: uppercase; margin-bottom: 4px; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; outline: none; transition: 0.2s; }
        .input-group input:focus { border-color: #2563eb; ring: 2px #bfdbfe; }
    </style>
</head>
<body>

<div id="toast" class="fixed top-5 right-5 z-[100] transform translate-x-full transition-transform duration-300 px-6 py-3 rounded-xl shadow-lg text-white font-bold"></div>

<!-- NAVIGATION -->
<nav id="public-nav" class="bg-white border-b px-10 py-4 flex justify-between items-center sticky top-0 z-50">
    <div class="text-2xl font-black text-blue-600 tracking-tighter">SigmaBooker</div>
    <div id="nav-links" class="flex gap-6 font-bold text-slate-600">
        <button onclick="showView('signup-view')" class="bg-blue-600 text-white px-6 py-2 rounded-lg">Sign Up</button>
        <button onclick="openLogin()" class="text-blue-600">Login</button>
    </div>
</nav>

<!-- FORMATION STEPPER -->
<section id="setup-view" class="view-section py-12 px-6">
    <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-xl border overflow-hidden">
        <!-- Progress Bar -->
        <div class="flex border-b">
            <div id="step-1-pill" class="step-pill flex-1 p-4 text-center text-xs font-bold active">1. BASIC</div>
            <div id="step-2-pill" class="step-pill flex-1 p-4 text-center text-xs font-bold">2. DETAILS</div>
            <div id="step-3-pill" class="step-pill flex-1 p-4 text-center text-xs font-bold">3. OPS</div>
            <div id="step-4-pill" class="step-pill flex-1 p-4 text-center text-xs font-bold">4. FINANCE</div>
            <div id="step-5-pill" class="step-pill flex-1 p-4 text-center text-xs font-bold">5. BANKING</div>
            <div id="step-6-pill" class="step-pill flex-1 p-4 text-center text-xs font-bold">6. REVIEW</div>
        </div>

        <form id="setup-form" class="p-10">
            <!-- STEP 1: BASIC -->
            <div id="step-1-content" class="step-content grid grid-cols-2 gap-6">
                <div class="input-group col-span-2"><label>Company Name</label><input type="text" id="c-name" required></div>
                <div class="input-group"><label>Business Type</label>
                    <select id="c-type">
                        <option>Private Limited Company</option>
                        <option>Sole Proprietorship</option>
                        <option>Partnership</option>
                    </select>
                </div>
                <div class="input-group"><label>Industry</label>
                    <select id="c-industry">
                        <option>Retail</option>
                        <option>IT / Software</option>
                        <option>Manufacturing</option>
                    </select>
                </div>
                <div class="input-group"><label>Currency</label><select id="c-currency"><option>PKR</option><option>USD</option><option>GBP</option></select></div>
            </div>

            <!-- STEP 3: OPERATIONS (LOGIC TRIGGER) -->
            <div id="step-3-content" class="step-content hidden grid grid-cols-2 gap-6">
                <div class="input-group"><label>Sell Products?</label><select id="ops-products"><option value="no">No</option><option value="yes">Yes</option></select></div>
                <div class="input-group"><label>Inventory Management?</label><select id="ops-inv"><option value="no">No</option><option value="yes">Yes</option></select></div>
                <div class="input-group"><label>Provide Services?</label><select id="ops-services"><option value="no">No</option><option value="yes">Yes</option></select></div>
            </div>

            <!-- STEP 6: REVIEW & COA -->
            <div id="step-6-content" class="step-content hidden">
                <h3 class="text-xl font-bold mb-4">Auto-Generated Chart of Accounts</h3>
                <div id="coa-preview" class="space-y-2 max-h-60 overflow-y-auto border p-4 rounded-xl bg-slate-50">
                    <!-- Dynamic COA injected here -->
                </div>
            </div>

            <div class="mt-10 flex justify-between">
                <button type="button" id="prev-btn" class="hidden px-8 py-3 font-bold text-slate-400">Back</button>
                <button type="button" id="next-btn" class="ml-auto bg-blue-600 text-white px-10 py-3 rounded-xl font-bold">Next Step</button>
                <button type="submit" id="submit-btn" class="hidden ml-auto bg-green-600 text-white px-10 py-3 rounded-xl font-bold">Confirm & Create</button>
            </div>
        </form>
    </div>
</section>

<!-- MAIN APP (SUPERADMIN VIEW) -->
<div id="app-layout" class="view-section h-screen flex">
    <aside class="w-64 bg-slate-900 text-slate-400 flex flex-col">
        <div class="p-6 text-white text-2xl font-black">NinjaBooks</div>
        <nav class="flex-1 px-4 space-y-2">
            <div id="sa-menu" class="hidden">
                <div class="text-[10px] text-slate-500 font-bold uppercase mb-2 px-3">Superadmin</div>
                <div onclick="loadApprovals()" class="p-3 bg-blue-600 text-white rounded-xl cursor-pointer font-bold">🏢 Approvals</div>
            </div>
            <!-- Dynamic menu based on QB Roles will go here -->
        </nav>
    </aside>
    <main class="flex-1 p-10 overflow-y-auto" id="main-content"></main>
</div>

<!-- LOGIN MODAL -->
<div id="login-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-[100]">
    <div class="bg-white p-10 rounded-3xl w-96 shadow-2xl">
        <h2 class="text-2xl font-bold mb-6">Login</h2>
        <input type="email" id="li-email" placeholder="Email" class="w-full p-4 border rounded-xl mb-4">
        <input type="password" id="li-pass" placeholder="Password" class="w-full p-4 border rounded-xl mb-6">
        <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">Sign In</button>
    </div>
</div>

<script>
const CONFIG = {
    SB_URL: 'https://ptxegnanbbnflcndqvdp.supabase.co',
    SB_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0eGVnbmFuYmJuZmxjbmRxdmRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5OTEyMDIsImV4cCI6MjA5MDU2NzIwMn0.8oH1qM4vvQWvji3sR8PkyhLYhjlONuu4zy_i-YLrtmU'
};

const _sb = supabase.createClient(CONFIG.SB_URL, CONFIG.SB_KEY);
let currentStep = 1;

// --- STEPPER LOGIC ---
document.getElementById('next-btn').onclick = () => {
    if (currentStep < 6) {
        document.getElementById(`step-${currentStep}-content`).classList.add('hidden');
        document.getElementById(`step-${currentStep}-pill`).classList.replace('active', 'completed');
        currentStep++;
        document.getElementById(`step-${currentStep}-content`).classList.remove('hidden');
        document.getElementById(`step-${currentStep}-pill`).classList.add('active');
        if(currentStep === 6) generateCOA();
        toggleButtons();
    }
};

function toggleButtons() {
    document.getElementById('prev-btn').classList.toggle('hidden', currentStep === 1);
    document.getElementById('next-btn').classList.toggle('hidden', currentStep === 6);
    document.getElementById('submit-btn').classList.toggle('hidden', currentStep !== 6);
}

// --- COA GENERATION LOGIC ---
function generateCOA() {
    const coaList = [
        { name: 'Cash', type: 'Asset' },
        { name: 'Accounts Receivable', type: 'Asset' },
        { name: 'Accounts Payable', type: 'Liability' },
        { name: 'Owner Equity', type: 'Equity' }
    ];

    if(document.getElementById('ops-inv').value === 'yes') {
        coaList.push({ name: 'Inventory', type: 'Asset' }, { name: 'COGS', type: 'Expense' });
    }
    if(document.getElementById('ops-services').value === 'yes') {
        coaList.push({ name: 'Service Revenue', type: 'Revenue' });
    }

    const container = document.getElementById('coa-preview');
    container.innerHTML = coaList.map(a => `
        <div class="flex justify-between p-2 bg-white border rounded-lg text-sm">
            <span class="font-bold">${a.name}</span>
            <span class="text-slate-400 uppercase text-[10px]">${a.type}</span>
        </div>
    `).join('');
}

// --- SUPERADMIN APPROVALS ---
async function loadApprovals() {
    const { data: comps } = await _sb.from('companies').select('*').eq('status', 'pending');
    const main = document.getElementById('main-content');
    main.innerHTML = `
        <h1 class="text-3xl font-black mb-8">Pending Company Approvals</h1>
        <div class="grid gap-4">
            ${comps.map(c => `
                <div class="bg-white p-6 rounded-2xl border flex justify-between items-center">
                    <div>
                        <div class="font-black text-lg">${c.name}</div>
                        <div class="text-sm text-slate-500">${c.industry} | ${c.email}</div>
                    </div>
                    <button onclick="approveCompany('${c.id}')" class="bg-green-600 text-white px-6 py-2 rounded-xl font-bold">Approve Entity</button>
                </div>
            `).join('')}
        </div>
    `;
}

async function approveCompany(id) {
    const { error } = await _sb.from('companies').update({ status: 'approved' }).eq('id', id);
    if(!error) { alert('Company Approved!'); loadApprovals(); }
}

async function checkAuth() {
    const { data: { user } } = await _sb.auth.getUser();
    if(user) {
        const { data: prof } = await _sb.from('profiles').select('*').eq('id', user.id).single();
        if(prof.role === 'superadmin') {
            document.getElementById('app-layout').classList.add('active');
            document.getElementById('sa-menu').classList.remove('hidden');
            loadApprovals();
        } else {
            // Check if they have an approved company
            const { data: comp } = await _sb.from('companies').select('*').eq('owner_id', user.id).single();
            if(!comp) showView('setup-view');
            else if(comp.status === 'pending') alert('Your company is awaiting Aslam\'s approval.');
            else { document.getElementById('app-layout').classList.add('active'); loadDashboard(); }
        }
    } else {
        showView('signup-view');
    }
}

function showView(id) {
    document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

window.onload = checkAuth;
</script>
</body>
</html>
